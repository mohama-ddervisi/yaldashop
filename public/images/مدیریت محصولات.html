<div class="page">

<header class="page-header">

<h1>مدیریت محصولات</h1>

<button id="add-product">
➕ افزودن محصول
</button>

</header>


<section class="top-bar">

<input type="text" id="search" placeholder="جستجوی محصول...">

<select id="category-filter">

<option value="">همه دسته بندی ها</option>

</select>

</section>


<section class="cards">

<div class="card">

<h3>کل محصولات</h3>

<p id="total-products">0</p>

</div>

<div class="card">

<h3>موجودی کل</h3>

<p id="total-stock">0</p>

</div>

<div class="card">

<h3>کم موجود</h3>

<p id="low-stock">0</p>

</div>

<div class="card">

<h3>غیرفعال</h3>

<p id="inactive-products">0</p>

</div>

</section>


<section class="table-box">

<table>

<thead>

<tr>

<th>عکس</th>

<th>نام</th>

<th>دسته</th>

<th>قیمت</th>

<th>موجودی</th>

<th>فروش</th>

<th>وضعیت</th>

<th>عملیات</th>

</tr>

</thead>

<tbody id="products-table">

</tbody>

</table>

</section>

<!-- Product Modal -->

<div id="product-modal" class="modal active">

    <div class="modal-content">

        <div class="modal-header">

            <h2 id="modal-title">افزودن محصول</h2>

            <button id="close-modal">

                ✕

            </button>

        </div>

        <form id="product-form">

            <div class="grid">

                <div class="field">

                    <label>

                        نام محصول

                    </label>

                    <input type="text" id="name">

                </div>

                <div class="field">

                    <label>

                        برند

                    </label>

                    <input type="text" id="brand">

                </div>

                <div class="field">

                    <label>

                        قیمت

                    </label>

                    <input type="number" id="price">

                </div>

                <div class="field">

                    <label>

                        قیمت قبل تخفیف

                    </label>

                    <input type="number" id="oldPrice">

                </div>

                <div class="field">

                    <label>

                        تخفیف

                    </label>

                    <input type="number" id="discount">

                </div>

                <div class="field">

                    <label>

                        موجودی

                    </label>

                    <input type="number" id="stock">

                </div>

                <div class="field">

                    <label>

                        دسته بندی

                    </label>

                    <input type="text" id="category">

                </div>

                <div class="field">

                    <label>

                        ویژگی اول

                    </label>

                    <input type="text" id="feature1">

                </div>

                <div class="field">

                    <label>

                        ویژگی دوم

                    </label>

                    <input type="text" id="feature2">

                </div>

            </div>

            <div class="field">

                <label>

                    توضیحات

                </label>

                <textarea id="description">
                </textarea>

            </div>

                <label>
