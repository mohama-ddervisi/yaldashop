<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>ثبت نام | Yalda Shop</title>

    <link rel="stylesheet" href="/css/style.css">

    <link rel="stylesheet" href="/css/login.css">

</head>

<body>

<section class="login-page">

    <div class="login-card">

        <div class="login-logo">

            <h1>YALDA</h1>

            <span>SHOP</span>

        </div>

        <h2>

            ساخت حساب کاربری

        </h2>

        <p>

            اطلاعات خود را وارد کنید.

        </p>

        <form id="register-form">

            <div class="input-group">

                <label>

                    نام و نام خانوادگی

                </label>

                <input
                    id="fullName"
                    type="text"
                    required>

            </div>

            <div class="input-group">

                <label>

                    شماره موبایل

                </label>

                <input
                    id="phone"
                    type="text"
                    required>

            </div>

            <div class="input-group">

                <label>

                    ایمیل (اختیاری)

                </label>

                <input
                    id="email"
                    type="email">

            </div>

            <div class="input-group">

                <label>

                    رمز عبور

                </label>

                <input
                    id="password"
                    type="password"
                    required>

            </div>

            <button
                class="login-btn"
                type="submit">

                ثبت نام

            </button>

        </form>

        <div class="login-footer">

            قبلاً حساب ساخته‌اید؟

            <a href="/login.html">

                ورود

            </a>

        </div>

    </div>

</section>

<div id="toast">

    <span id="toast-message"></span>

</div>

<script src="/js/common.js"></script>
<script src="/js/register.js"></script>
<script src="/js/auth.js"></script>
</body>

</html>
